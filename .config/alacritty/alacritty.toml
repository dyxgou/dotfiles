import = [
  "/usr/lib/node_modules/alacritty-themes/themes/Afterglow.toml"
]

[font]
size = 17

  [font.bold]
  family = "Lilex Nerd Font Mono"
  style = "Bold"

  [font.bold_italic]
  family = "Lilex Nerd Font Mono"
  style = "Bold Italic"

  [font.italic]
  family = "Lilex Nerd Font Mono"
  style = "Italic"

  [font.normal]
  family = "Lilex Nerd Font Mono"
  style = "Regular"

[window]
opacity = 0.7
blur = true

[shell]
program = "/bin/tmux"

[[keyboard.bindings]]
key = "N"
mods = "Super"
action = "SpawnNewInstance"
